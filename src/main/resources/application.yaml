server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:adminworkbench
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: beans,conditions
debug: true